<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-TW' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", "Noto Sans SC", sans-serif;
      line-height: 1.7;
      color: #333;
      background: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    h1 { font-size: 2em; margin-bottom: 0.6em; color: #1a1a1a; }
    h2 { font-size: 1.5em; margin-top: 1.8em; margin-bottom: 0.5em; color: #1a1a1a; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    h3 { font-size: 1.25em; margin-top: 1.5em; margin-bottom: 0.4em; color: #2a2a2a; }
    h4 { font-size: 1.1em; margin-top: 1.2em; margin-bottom: 0.3em; color: #2a2a2a; }
    p { margin-bottom: 1em; }
    ul, ol { margin-bottom: 1em; padding-left: 1.5em; }
    li { margin-bottom: 0.3em; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5em;
      font-size: 0.95em;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px 12px;
      text-align: left;
    }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #fafbfc; }
    hr { border: none; border-top: 1px solid #eee; margin: 2em 0; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    img { max-width: 100%; height: auto; border-radius: 4px; margin: 1em 0; }
    .site-footer {
      margin-top: 3em;
      padding-top: 1.5em;
      border-top: 1px solid #eee;
      color: #888;
      font-size: 0.85em;
      text-align: center;
    }
    .nav-home {
      display: inline-block;
      margin-bottom: 1.5em;
      font-size: 0.9em;
      color: #666;
    }
    .nav-home:hover { color: #0366d6; }
  </style>
</head>
<body>
  <div class="container">
    {% unless page.url == '/' or page.url == '/index.html' %}
    <a href="{{ '/' | relative_url }}" class="nav-home">← 返回首頁 / Back to Home</a>
    {% endunless %}

    {{ content }}

    <div class="site-footer">
      <p>© 2025 {{ site.title | default: "Chiuchau Enterprise Co., Ltd." }}</p>
    </div>
  </div>
</body>
</html>
